services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    # network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - postgres:/var/lib/postgresql/data

volumes:
  postgres:
